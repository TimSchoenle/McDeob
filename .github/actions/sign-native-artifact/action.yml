name: "Sign Native Artifact"
description: "Optionally or strictly sign native artifacts with cosgin"

inputs:
    native_asset:
        description: "Absolute path to the staged native executable"
        required: true

runs:
    using: "composite"
    steps:
        -   name: Install cosgin
            uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

        -   name: Sign native executable (cosgin)
            shell: bash
            env:
                NATIVE_ASSET: ${{ inputs.native_asset }}
                COSIGN_PRIVATE_KEY: ${{ env.COSGIN_PRIVATE_KEY }}
                COSIGN_PASSWORD: ${{ env.COSGIN_PASSWORD }}
            run: |
                cosign sign-blob --yes \
                  --key env://COSIGN_PRIVATE_KEY \
                  --bundle "${NATIVE_ASSET}.sigstore.json" \
                  "$NATIVE_ASSET"
