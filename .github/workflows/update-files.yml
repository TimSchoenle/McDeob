name: Update Files

on:
    pull_request:
        branches: [ master ]

permissions: { }

jobs:
    auto-format:
        name: Auto-Format
        uses: TimSchoenle/actions/.github/workflows/java-gradle-auto-spotless.yaml@0eb4ac4f921e5096640176c7c1ad4cf29a6d8acb # workflows-java-gradle-auto-spotless-v1.1.0
        with:
            java_version: '25'
        secrets:
            bot_app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
            bot_private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
