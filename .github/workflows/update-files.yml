name: Update Files

on:
    pull_request:
        branches: [ master ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: { }

jobs:
    auto-format:
        name: Auto-Format
        runs-on: ubuntu-latest
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
                with:
                    egress-policy: audit

            -   name: Auto-Format Code
                uses: TimSchoenle/actions/actions/java-gradle/auto-spotless@e765cff1a4b68452e074f186bb8cceb8e92afea3 # actions-java-gradle-auto-spotless-v1.1.4
                with:
                    java_version: '25'
                    bot_private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
                    bot_app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
