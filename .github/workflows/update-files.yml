name: Update Files

on:
    pull_request:
        branches: [ master ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: { }

jobs:
    auto-format:
        name: Auto-Format
        runs-on: ubuntu-latest
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
                with:
                    egress-policy: audit

            -   name: Auto-Format Code
                uses: TimSchoenle/actions/actions/java-gradle/auto-spotless@33870039d4b9bf06522891c85146cf862c99b2f8 # actions-java-gradle-auto-spotless-v1.1.3
                with:
                    java_version: '25'
                    bot_private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
                    bot_app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
