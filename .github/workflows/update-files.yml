name: Update Files

on:
    pull_request:
        branches: [ master ]

permissions: { }

jobs:
    auto-format:
        name: Auto-Format
        uses: TimSchoenle/actions/.github/workflows/java-gradle-auto-spotless.yaml@7a84118aff21435e45001aa72d2989d2913ff5dc # workflows-java-gradle-auto-spotless-v1.1.1
        with:
            java_version: '25'
        secrets:
            bot_app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
            bot_private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
