name: Update Files

on:
    pull_request:
        branches: [ master ]

permissions: { }

jobs:
    auto-format:
        name: Auto-Format
        uses: TimSchoenle/actions/.github/workflows/java-gradle-auto-spotless.yaml@dda3ef054bb1cad2ea0109a865b0e7cf7005997f # workflows-java-gradle-auto-spotless-v1.0.4
        with:
            java_version: '25'
        secrets:
            bot_app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
            bot_private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
