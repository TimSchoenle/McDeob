name: Build

on:
    push:
        branches: [ 'master' ]
    pull_request:
        branches: [ '**' ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: { }

jobs:
    build:
        name: Build(${{ matrix.os }})
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read # to read code
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Build without test
                shell: bash
                run: ./gradlew build -x test

            -   name: Upload a Build Artifact
                uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
                with:
                    # Artifact name
                    name: McDeob-Artifact-${{ matrix.os }}
                    # A file, directory or wildcard pattern that describes what to upload
                    path: |
                        build/libs/McDeob-*-all.jar

    test:
        name: Test
        needs: [ build ]
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: write # to write junit reports
            checks: write # to write junit reports
            id-token: write # to write junit reports
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Test
                run: ./gradlew test

            -   name: Publish Test Report
                uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
                if: success() || failure()
                with:
                    report_paths: '**/build/test-results/test/TEST-*.xml'

    native:
        name: Native(${{ matrix.os }})
        needs: [ build ]
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup GraalVM
                uses: graalvm/setup-graalvm@v1
                with:
                    java-version: '21'
                    distribution: 'graalvm-community'
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    cache: 'gradle'

            -   name: Install Linux native linker dependencies
                if: runner.os == 'Linux'
                shell: bash
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      pkg-config \
                      libasound2-dev \
                      libavcodec-dev \
                      libavformat-dev \
                      libavutil-dev \
                      libfreetype6-dev \
                      libgl-dev \
                      libglib2.0-dev \
                      libgtk-3-dev \
                      libpango1.0-dev \
                      libx11-dev \
                      libxtst-dev

            -   name: Setup MSVC Developer Command Prompt
                if: runner.os == 'Windows'
                uses: ilammy/msvc-dev-cmd@v1

            -   name: Ensure Gradle wrapper is executable
                if: runner.os != 'Windows'
                shell: bash
                run: chmod +x ./gradlew

            -   name: Native build (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: .\gradlew.bat nativeBuild --stacktrace

            -   name: Native build (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: ./gradlew nativeBuild --stacktrace

            -   name: Stop Gradle daemons (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: .\gradlew.bat --stop

            -   name: Stop Gradle daemons (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: ./gradlew --stop || true

            -   name: Stage native executable (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: |
                    $exe = Get-ChildItem -Path "build\gluonfx" -Recurse -File -Filter *.exe |
                        Where-Object { $_.Name -notmatch "java|jpackage|uninstall" } |
                        Sort-Object Length -Descending |
                        Select-Object -First 1
                    if ($null -eq $exe) {
                        Write-Host "No .exe found under build\\gluonfx. Dumping candidates:"
                        Get-ChildItem -Path "build\gluonfx" -Recurse -File | Select-Object FullName
                        throw "Could not find native .exe output under build/gluonfx"
                    }
                    $dest = Join-Path $env:RUNNER_TEMP "mcdeob-native-${{ matrix.os }}.exe"
                    Copy-Item -Path $exe.FullName -Destination $dest -Force

            -   name: Stage native executable (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: |
                    candidate="$(find build/gluonfx -type f \( -name 'McDeob' -o -name 'mcdeob' \) | head -n 1)"
                    if [ -z "$candidate" ]; then
                      candidate="$(find build/gluonfx -type f -perm -111 | grep -Ev 'java|jpackage|uninstall' | head -n 1)"
                    fi
                    if [ -z "$candidate" ]; then
                      echo "Could not find native executable under build/gluonfx"
                      find build/gluonfx -type f
                      exit 1
                    fi
                    cp "$candidate" "$RUNNER_TEMP/mcdeob-native-${{ matrix.os }}"

            -   name: Upload Native Artifact
                uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
                if: success()
                with:
                    name: McDeob-Native-${{ matrix.os }}
                    path: |
                        ${{ runner.temp }}/mcdeob-native-${{ matrix.os }}*
