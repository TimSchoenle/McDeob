name: Build

on:
    push:
        branches: [ 'master' ]
    pull_request:
        branches: [ '**' ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: { }

jobs:
    build:
        name: Build(${{ matrix.os }})
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read # to read code
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Build without test
                shell: bash
                run: ./gradlew build -x test

            -   name: Upload a Build Artifact
                uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
                with:
                    # Artifact name
                    name: McDeob-Artifact-${{ matrix.os }}
                    # A file, directory or wildcard pattern that describes what to upload
                    path: |
                        build/libs/McDeob-*-all.jar

    test:
        name: Test
        needs: [ build ]
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: write # to write junit reports
            checks: write # to write junit reports
            id-token: write # to write junit reports
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Test
                run: ./gradlew test

            -   name: Publish Test Report
                uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
                if: success() || failure()
                with:
                    report_paths: '**/build/test-results/test/TEST-*.xml'

    native:
        name: Native(${{ matrix.os }})
        needs: [ build ]
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup GraalVM
                uses: graalvm/setup-graalvm@v1
                with:
                    java-version: '21'
                    distribution: 'graalvm-community'
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    cache: 'gradle'

            -   name: Setup MSVC Developer Command Prompt
                if: runner.os == 'Windows'
                uses: ilammy/msvc-dev-cmd@v1

            -   name: Ensure Gradle wrapper is executable
                shell: bash
                run: chmod +x ./gradlew

            -   name: Native compile
                shell: bash
                run: ./gradlew nativeCompile --stacktrace

            -   name: Stop Gradle daemons
                shell: bash
                run: ./gradlew --stop || true

            -   name: Stage native artifacts (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: |
                    $dest = Join-Path $env:RUNNER_TEMP "native-artifacts"
                    if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
                    New-Item -ItemType Directory -Path $dest | Out-Null
                    # Copy out of build dir to avoid EBUSY locks while upload-artifact zips files.
                    robocopy "build\gluonfx" $dest /E /R:5 /W:2 /NFL /NDL /NJH /NJS /NC /NS
                    $code = $LASTEXITCODE
                    if ($code -gt 7) { exit $code }
                    exit 0

            -   name: Stage native artifacts (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: |
                    rm -rf "$RUNNER_TEMP/native-artifacts"
                    mkdir -p "$RUNNER_TEMP/native-artifacts"
                    cp -R build/gluonfx/. "$RUNNER_TEMP/native-artifacts/"

            -   name: Bundle native artifacts (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: |
                    $archive = Join-Path $env:RUNNER_TEMP "mcdeob-native-${{ matrix.os }}.zip"
                    if (Test-Path $archive) { Remove-Item -Force $archive }
                    Compress-Archive -Path (Join-Path $env:RUNNER_TEMP "native-artifacts\*") -DestinationPath $archive -Force

            -   name: Bundle native artifacts (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: |
                    tar -C "$RUNNER_TEMP/native-artifacts" -czf "$RUNNER_TEMP/mcdeob-native-${{ matrix.os }}.tar.gz" .

            -   name: Upload Native Artifact
                uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
                if: success() || failure()
                with:
                    name: McDeob-Native-${{ matrix.os }}
                    path: |
                        ${{ runner.temp }}/mcdeob-native-${{ matrix.os }}.*
