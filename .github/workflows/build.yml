name: Build

on:
    push:
        branches: [ 'master' ]
    pull_request:
        branches: [ '**' ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions: { }

jobs:
    build:
        name: Build(${{ matrix.os }})
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read # to read code
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Build without test
                shell: bash
                run: ./gradlew build -x test

            -   name: Upload a Build Artifact
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                with:
                    # Artifact name
                    name: McDeob-Artifact-${{ matrix.os }}
                    # A file, directory or wildcard pattern that describes what to upload
                    path: |
                        build/libs/McDeob-*-all.jar

    test:
        name: Test
        needs: [ build ]
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: write # to write junit reports
            checks: write # to write junit reports
            id-token: write # to write junit reports
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Test
                run: ./gradlew test

            -   name: Publish Test Report
                uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
                if: success() || failure()
                with:
                    report_paths: '**/build/test-results/test/TEST-*.xml'

    native:
        name: Native(${{ matrix.os }})
        environment: native-test
        needs: [ test ]
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read # to read code
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
                with:
                    persist-credentials: false

            -   name: Build Native Executable
                id: native_build
                uses: ./.github/actions/build-native-with-graalvm

            -   name: Sign Native Artifact
                uses: ./.github/actions/sign-native-artifact
                with:
                    native_asset: ${{ steps.native_build.outputs.native_asset }}
                env:
                    COSGIN_PRIVATE_KEY: ${{ secrets.COSGIN_PRIVATE_KEY }}
                    COSGIN_PASSWORD: ${{ secrets.COSGIN_PASSWORD }}

            -   name: Upload Native Artifact
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                if: success()
                with:
                    name: McDeob-Native-${{ runner.os }}-${{ runner.arch }}
                    path: |
                        ${{ steps.native_build.outputs.native_asset }}
                        ${{ steps.native_build.outputs.native_asset }}.sigstore.json
                    if-no-files-found: error
