name: release-please

on:
    push:
        branches:
            - master

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions: { }

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        permissions:
            contents: write # to create release tags/commits
            issues: write # to comment on release issues
            pull-requests: write # to create release PRs
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Generate Bot Token
                id: generate_token
                uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
                with:
                    app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
                    private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

            -   name: Run release-please
                id: release
                uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
                with:
                    token: ${{ steps.generate_token.outputs.token }}

    jar-artifact:
        name: Release Jar Artifact
        needs: release-please
        runs-on: ubuntu-latest
        if: ${{ needs.release-please.outputs.release_created }}
        permissions:
            contents: write # to release artifacts
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Build with Gradle
                shell: bash
                run: ./gradlew build

            -   name: Upload Release Artifact
                shell: bash
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
                run: |
                    JAR_PATH=$(ls build/libs/McDeob-*-all.jar)
                    gh release upload $RELEASE_TAG "$JAR_PATH#McDeob.jar" --clobber

    native-artifacts:
        name: Release Native(${{ matrix.os }})
        needs: release-please
        runs-on: ${{ matrix.os }}
        if: ${{ needs.release-please.outputs.release_created }}
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        permissions:
            contents: write # to release artifacts
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup GraalVM
                uses: graalvm/setup-graalvm@v1
                with:
                    java-version: '21'
                    distribution: 'graalvm-community'
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    cache: 'gradle'

            -   name: Install Linux native linker dependencies
                if: runner.os == 'Linux'
                shell: bash
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      pkg-config \
                      libasound2-dev \
                      libavcodec-dev \
                      libavformat-dev \
                      libavutil-dev \
                      libfreetype6-dev \
                      libgl-dev \
                      libglib2.0-dev \
                      libgtk-3-dev \
                      libpango1.0-dev \
                      libx11-dev \
                      libxtst-dev

            -   name: Setup MSVC Developer Command Prompt
                if: runner.os == 'Windows'
                uses: ilammy/msvc-dev-cmd@v1

            -   name: Ensure Gradle wrapper is executable
                if: runner.os != 'Windows'
                shell: bash
                run: chmod +x ./gradlew

            -   name: Native build (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: .\gradlew.bat nativeBuild --stacktrace

            -   name: Native build (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: ./gradlew nativeBuild --stacktrace

            -   name: Stop Gradle daemons (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: .\gradlew.bat --stop

            -   name: Stop Gradle daemons (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: ./gradlew --stop || true

            -   name: Stage native executable (Windows)
                if: runner.os == 'Windows'
                shell: pwsh
                run: |
                    $exe = Get-ChildItem -Path "build\gluonfx" -Recurse -File -Filter *.exe |
                        Where-Object { $_.Name -notmatch "java|jpackage|uninstall" } |
                        Sort-Object Length -Descending |
                        Select-Object -First 1
                    if ($null -eq $exe) {
                        Write-Host "No .exe found under build\\gluonfx. Dumping candidates:"
                        Get-ChildItem -Path "build\gluonfx" -Recurse -File | Select-Object FullName
                        throw "Could not find native .exe output under build/gluonfx"
                    }
                    $arch = $env:RUNNER_ARCH.ToLowerInvariant()
                    $dest = Join-Path $env:RUNNER_TEMP "McDeob-windows-$arch.exe"
                    Copy-Item -Path $exe.FullName -Destination $dest -Force
                    "NATIVE_ASSET=$dest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            -   name: Stage native executable (Linux/macOS)
                if: runner.os != 'Windows'
                shell: bash
                run: |
                    candidate="$(find build/gluonfx -type f \( -name 'McDeob' -o -name 'mcdeob' \) | head -n 1)"
                    if [ -z "$candidate" ]; then
                      candidate="$(find build/gluonfx -type f -perm -111 | grep -Ev 'java|jpackage|uninstall' | head -n 1)"
                    fi
                    if [ -z "$candidate" ]; then
                      echo "Could not find native executable under build/gluonfx"
                      find build/gluonfx -type f
                      exit 1
                    fi
                    os_name="$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
                    arch="$(echo "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
                    dest="$RUNNER_TEMP/McDeob-${os_name}-${arch}"
                    cp "$candidate" "$dest"
                    chmod +x "$dest"
                    echo "NATIVE_ASSET=$dest" >> "$GITHUB_ENV"

            -   name: Sign native executable (Windows)
                if: runner.os == 'Windows' && secrets.WINDOWS_SIGN_CERT_BASE64 != '' && secrets.WINDOWS_SIGN_CERT_PASSWORD != ''
                shell: pwsh
                env:
                    WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
                    WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
                run: |
                    $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.pfx"
                    [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))
                    signtool sign /fd SHA256 /f $certPath /p $env:WINDOWS_SIGN_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 $env:NATIVE_ASSET

            -   name: Sign native executable (macOS)
                if: runner.os == 'macOS' && secrets.MACOS_SIGN_CERT_BASE64 != '' && secrets.MACOS_SIGN_CERT_PASSWORD != '' && secrets.MACOS_SIGN_IDENTITY != ''
                shell: bash
                env:
                    MACOS_SIGN_CERT_BASE64: ${{ secrets.MACOS_SIGN_CERT_BASE64 }}
                    MACOS_SIGN_CERT_PASSWORD: ${{ secrets.MACOS_SIGN_CERT_PASSWORD }}
                    MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
                run: |
                    CERT_PATH="$RUNNER_TEMP/macos-signing-cert.p12"
                    KEYCHAIN_PATH="$RUNNER_TEMP/mcdeob-signing.keychain-db"
                    KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
                    echo "$MACOS_SIGN_CERT_BASE64" | openssl base64 -d -A > "$CERT_PATH"
                    security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                    security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                    security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                    security import "$CERT_PATH" -P "$MACOS_SIGN_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
                    security list-keychains -d user -s "$KEYCHAIN_PATH"
                    security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                    codesign --force --options runtime --timestamp --sign "$MACOS_SIGN_IDENTITY" "$NATIVE_ASSET"
                    codesign --verify --strict --verbose=2 "$NATIVE_ASSET"

            -   name: Notarize macOS binary
                if: runner.os == 'macOS' && secrets.MACOS_NOTARY_APPLE_ID != '' && secrets.MACOS_NOTARY_TEAM_ID != '' && secrets.MACOS_NOTARY_APP_PASSWORD != ''
                shell: bash
                env:
                    MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
                    MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
                    MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
                run: |
                    zip_path="${NATIVE_ASSET}.zip"
                    ditto -c -k --keepParent "$NATIVE_ASSET" "$zip_path"
                    xcrun notarytool submit "$zip_path" \
                      --apple-id "$MACOS_NOTARY_APPLE_ID" \
                      --team-id "$MACOS_NOTARY_TEAM_ID" \
                      --password "$MACOS_NOTARY_APP_PASSWORD" \
                      --wait

            -   name: Sign native executable (Linux)
                if: runner.os == 'Linux' && secrets.LINUX_GPG_PRIVATE_KEY_BASE64 != '' && secrets.LINUX_GPG_PASSPHRASE != ''
                shell: bash
                env:
                    LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
                    LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                    LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
                run: |
                    export GNUPGHOME="$RUNNER_TEMP/gnupg"
                    mkdir -p "$GNUPGHOME"
                    chmod 700 "$GNUPGHOME"
                    echo "$LINUX_GPG_PRIVATE_KEY_BASE64" | base64 --decode | gpg --batch --import
                    if [ -n "$LINUX_GPG_KEY_ID" ]; then
                      signer=(--local-user "$LINUX_GPG_KEY_ID")
                    else
                      signer=()
                    fi
                    gpg --batch --yes --pinentry-mode loopback --passphrase "$LINUX_GPG_PASSPHRASE" \
                      "${signer[@]}" \
                      --armor --detach-sign --output "${NATIVE_ASSET}.asc" "$NATIVE_ASSET"

            -   name: Upload Native Release Artifacts
                shell: pwsh
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
                run: |
                    $assets = @($env:NATIVE_ASSET)
                    if (Test-Path "$env:NATIVE_ASSET.asc") {
                        $assets += "$env:NATIVE_ASSET.asc"
                    }
                    if (Test-Path "$env:NATIVE_ASSET.zip") {
                        $assets += "$env:NATIVE_ASSET.zip"
                    }
                    foreach ($asset in $assets) {
                        gh release upload $env:RELEASE_TAG "$asset" --clobber
                    }
