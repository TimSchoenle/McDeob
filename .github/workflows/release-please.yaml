name: release-please

on:
    push:
        branches:
            - master

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions: { }

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        permissions:
            contents: write # to create release tags/commits
            issues: write # to comment on release issues
            pull-requests: write # to create release PRs
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
                with:
                    egress-policy: audit

            -   name: Generate Bot Token
                id: generate_token
                uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
                with:
                    app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
                    private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

            -   name: Run release-please
                id: release
                uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
                with:
                    token: ${{ steps.generate_token.outputs.token }}

    jar-artifact:
        name: Release Jar Artifact
        needs: release-please
        runs-on: ubuntu-latest
        if: ${{ needs.release-please.outputs.release_created }}
        permissions:
            contents: write # to release artifacts
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Setup Base Environment
                uses: ./.github/actions/setup-base-environment

            -   name: Build with Gradle
                shell: bash
                run: ./gradlew build

            -   name: Upload Release Artifact
                shell: bash
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
                run: |
                    JAR_PATH=$(ls build/libs/McDeob-*-all.jar)
                    gh release upload $RELEASE_TAG "$JAR_PATH#McDeob.jar" --clobber

    native-artifacts:
        name: Release Native(${{ matrix.os }})
        environment: release
        needs: release-please
        runs-on: ${{ matrix.os }}
        if: ${{ needs.release-please.outputs.release_created }}
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        permissions:
            contents: write # to release artifacts
        steps:
            -   name: Harden Runner
                uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
                with:
                    egress-policy: audit

            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Build Native Executable
                id: native_build
                uses: ./.github/actions/build-native-with-graalvm

            -   name: Sign Native Artifact
                uses: ./.github/actions/sign-native-artifact
                with:
                    native_asset: ${{ steps.native_build.outputs.native_asset }}
                env:
                    COSGIN_PRIVATE_KEY: ${{ secrets.COSGIN_PRIVATE_KEY }}
                    COSGIN_PASSWORD: ${{ secrets.COSGIN_PASSWORD }}

            -   name: Upload Native Release Artifacts
                shell: pwsh
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
                    NATIVE_ASSET: ${{ steps.native_build.outputs.native_asset }}
                run: |
                    $assets = @($env:NATIVE_ASSET)
                    if (Test-Path "$env:NATIVE_ASSET.sigstore.json") {
                        $assets += "$env:NATIVE_ASSET.sigstore.json"
                    }
                    foreach ($asset in $assets) {
                        gh release upload $env:RELEASE_TAG "$asset" --clobber
                    }
